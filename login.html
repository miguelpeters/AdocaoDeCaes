<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header>
        <nav>
            <h2>Faça seu Cadastro</h2>
            <ul>
                <li><a href="login.html">Cadastrar-se</a></li>
                <li><a href="Adocao.html">Adoção</a></li>
                <li>Sair</li> 
            </ul>
        </nav>
    </header>
    </div>

    <main>
        

        <form id="formAdocao">
            <br>
        
            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Digite seu Nome">
            <br>

            <label for="email">Email:</label>
            <input type="text" id="email" placeholder="Digite seu email">
            <br>

            <label for="moradia">Moradia:</label>
            <select name="moradia" id="moradia">

                <option value="">Selecione</option>
                <option value="casa">Casa</option>
                <option value="apartamento">Apartamento</option>

            </select>
            <br>

            <label for="quintal">Possui Quintal?</label> <br>
            <input type="radio" name="quintal" value="sim"> Sim
            <input type="radio" name="quintal" value="não"> Não
            <br>

            <label for="telefone">Telefone:</label>
            <input type="text" id="telefone" placeholder="Digite seu telefone">
            <br>


            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" placeholder="Digite seu CPF">
            <br>

            <label for="idade">Idade:</label>
            <input type="number" id="idade" placeholder="Sua idade">
            <br>

            <label for="cidade">Cidade:</label>
            <input type="text" id="cidade" placeholder="Sua cidade">
            <br>

            <label for="pet">Ja teve pet?</label> <br>
            <input type="radio" name="pet" value="sim"> Sim
            <input type="radio" name="pet" value="nao"> Não
            <br>

            <label for="horas">Quantas horas o animal ficará sozinho?</label>
            <input type="number" id="horas">
            <br>

            <label for="motivo">Motivo da adoção:</label>
            <input type="text" id="motivo"></input>
            <br>

            <label>
                Aceito os termos de responsabilidade <input type="checkbox" id="termo">
            </label>
            <br>
            
            <div class="botaoenviar">
            <button id="button2" type="submit">Enviar</button>
            </div>
        </form>

        <div id="resultado"></div>

    </main>


    <script src="script.js"></script>
</body>

<script src="script.js"></script>

</html>
